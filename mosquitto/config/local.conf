# WIFY 개발용 Mosquitto 설정 (Windows 네이티브 실행용)
# 실행:  & "C:\Program Files\mosquitto\mosquitto.exe" -c mosquitto\config\local.conf -v
#
# Docker 컨테이너용은 mosquitto.conf 를 사용. 이 파일은 윈도우에서 직접 띄울 때 쓴다.

# MQTT (TCP) — 0.0.0.0 바인딩이라 같은 공유기의 ESP32/안드로이드에서 접속 가능
listener 1883 0.0.0.0
protocol mqtt

# MQTT over WebSocket (안드로이드/웹에서 직접 구독 시)
listener 9001 0.0.0.0
protocol websockets

# 개발 단계: 익명 접속 허용. 운영 전 반드시 인증 적용할 것.
allow_anonymous true

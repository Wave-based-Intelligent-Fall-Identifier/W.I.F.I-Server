# WIFY 개발용 Mosquitto 설정
persistence true
persistence_location /mosquitto/data/
log_dest file /mosquitto/log/mosquitto.log
log_dest stdout

# MQTT (TCP)
listener 1883
protocol mqtt

# MQTT over WebSocket (Android/웹에서 직접 구독 시)
listener 9001
protocol websockets

# 개발 단계: 익명 접속 허용. 운영 전 반드시 인증 적용할 것.
allow_anonymous true
